<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slik — Design at the speed of thought</title>
  <meta name="description" content="Generate production-ready SaaS apps with premium UI, authentication, and database setup in seconds." />
  <meta property="og:title" content="Slik — Design at the speed of thought" />
  <meta property="og:description" content="Generate premium SaaS apps in seconds." />
  <script>
    (function() {
      try {
        var localTheme = localStorage.getItem('theme');
        var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (localTheme === 'dark' || (!localTheme && sysTheme) || !localTheme) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  <style>
    html { transition: background-color 0.3s ease, color 0.3s ease; }
  </style>
</head>
<body class="bg-white dark:bg-[#09090b] text-[#09090b] dark:text-[#fafafa] antialiased selection:bg-emerald-500 selection:text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
